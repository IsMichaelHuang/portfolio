# =============================================================================
# Deploy to GitHub Pages
# =============================================================================
#
# Automated CI/CD pipeline that builds the portfolio and deploys it to
# GitHub Pages. Fetches pinned repo data from the GitHub API at build
# time so the Projects section stays in sync without manual edits.
#
# Triggers:
#   push to main       — deploy immediately after every merge
#   schedule (daily)    — refresh pinned repo data even without code changes
#   workflow_dispatch   — manual "Run workflow" button in the Actions tab
#
# Pipeline:
#   Checkout → Install → Fetch Pinned Repos → Vite Build → Deploy to Pages
#
# Prerequisites:
#   - GitHub Pages source must be set to "GitHub Actions" in repo settings
#     (Settings → Pages → Source → GitHub Actions)
#   - No additional secrets required — GITHUB_TOKEN is auto-generated
# =============================================================================

name: Deploy to GitHub Pages

# --- Trigger conditions ---
on:
  push:
    branches: [main]            # Deploy on every push to the default branch
  schedule:
    - cron: "0 0 * * *"         # Run daily at midnight UTC to refresh project data
  workflow_dispatch:             # Allow manual trigger from the GitHub Actions UI

# --- Token permissions ---
# Scoped to the minimum needed: read source code, write to Pages.
# id-token: write is required by the deploy-pages action for OIDC auth.
permissions:
  contents: read
  pages: write
  id-token: write

# --- Concurrency guard ---
# If a new deploy starts while one is in progress, cancel the old one.
# Prevents stale builds from overwriting a newer deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}    # Outputs the live URL after deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm              # Caches node_modules between runs for faster installs

      # npm ci (clean install) installs exact versions from package-lock.json.
      # Preferred over npm install in CI — deterministic and faster.
      - name: Install dependencies
        run: npm ci

      # Runs scripts/fetch-pinned.ts which queries the GitHub GraphQL API
      # for pinned repos and writes them to src/data/projects.ts.
      # GITHUB_TOKEN is auto-generated by Actions — no manual secret setup.
      - name: Fetch pinned repos
        run: npx tsx scripts/fetch-pinned.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Runs TypeScript compilation (tsc -b) then Vite production build.
      # Output goes to dist/ as configured in vite.config.ts.
      - name: Build
        run: npm run build

      # The remaining steps are GitHub's official Pages deployment pattern.
      # configure-pages sets up the Pages environment, upload-pages-artifact
      # packages dist/ for deployment, and deploy-pages publishes it.
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
